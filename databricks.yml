bundle:
  name: brickbot2026

resources:
  apps:
    brickbot:
      name: "brickbot2026"
      description: "Brickbot - DAIS 2026 conference assistant"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "brickbot"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "main"

      resources:
        - name: "experiment"
          experiment:
            experiment_id: ""
            permission: "CAN_MANAGE"

  jobs:
    rainfocus_data_refresh:
      name: "brickbot-rainfocus-refresh"
      description: "Refresh session and exhibitor data from RainFocus API every 15 minutes"
      schedule:
        quartz_cron_expression: "0 */15 * * * ?"
        timezone_id: "America/Los_Angeles"
        pause_status: "UNPAUSED"
      tasks:
        - task_key: refresh_sessions
          sql_task:
            file:
              path: ./resources/jobs/refresh_sessions.sql
            warehouse_id: c02046f2c3702009
        - task_key: refresh_exhibitors
          sql_task:
            file:
              path: ./resources/jobs/refresh_exhibitors.sql
            warehouse_id: c02046f2c3702009

targets:
  dev:
    mode: development
    default: true
